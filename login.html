<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc,#ff7eb3);
}

.login-box{
background:white;
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#6a11cb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2575fc;
}

</style>

<script>

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username!="" && password!="")
{
window.location.href="home.html";
}
else
{
alert("Please enter username and password");
}

}

</script>

</head>

<body>

<div class="login-box">

<h2>💱 Currency Converter Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</body>
</html>
