<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#6a11cb,#2575fc);
color:white;
text-align:center;
}

header{
padding:20px;
background:rgba(0,0,0,0.2);
}

.container{
margin-top:80px;
}

.converter{
background:white;
color:black;
padding:30px;
width:320px;
margin:auto;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#6a11cb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2575fc;
}

</style>

<script>

function convert(){

let amount=document.getElementById("amount").value;
let result=document.getElementById("result");

let rate=83; 

if(amount=="")
{
result.innerHTML="Enter amount";
}
else
{
result.innerHTML="Converted Amount: "+(amount*rate);
}

}

</script>

</head>

<body>

<header>
<h1>🌍 Currency Converter</h1>
<p>Live Currency Conversion Tool</p>
</header>

<div class="container">

<div class="converter">

<h3>Convert Currency</h3>

<input type="number" id="amount" placeholder="Enter Amount">

<select>
<option>USD</option>
<option>EUR</option>
<option>INR</option>
<option>GBP</option>
</select>

<select>
<option>INR</option>
<option>USD</option>
<option>EUR</option>
<option>GBP</option>
</select>

<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

</div>

</div>

</body>
</html>
